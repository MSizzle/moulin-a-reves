name: Client Feedback Agent

# A client-feedback submission becomes a `client-feedback`-labelled issue
# (src/pages/api/feedback/submit.ts). This runs Claude Code under
# .github/CLAUDE_FEEDBACK.md to make the change + open a PR, and squash-merges
# it ONLY when Claude judged it safe and labelled the issue `auto-approved`.
# The client-reply round-trip re-fires via the `@claude` issue comment posted
# by src/pages/api/feedback/clarify.ts.

on:
  issues:
    types: [opened, labeled]
  issue_comment:
    types: [created]

concurrency:
  group: feedback-issue-${{ github.event.issue.number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  feedback:
    # Guards:
    #  - repo owner only (the feedback API uses the owner's GITHUB_TOKEN, so
    #    issues/comments it creates have actor == owner; bot/3rd-party actors
    #    are rejected).
    #  - issue (not PR) must currently carry the exact `client-feedback`
    #    label — this also excludes `client-feedback-test` (TEST submissions).
    #  - on `issues`: only `opened`, or `labeled` when the added label is
    #    `client-feedback` (so Claude/workflow adding auto-approved /
    #    needs-review / auto-merged labels does NOT re-trigger the agent).
    #  - on `issue_comment`: only when the comment contains `@claude` (the
    #    client clarify reply); our own result comment never does.
    if: >-
      github.actor == github.repository_owner &&
      !github.event.issue.pull_request &&
      contains(github.event.issue.labels.*.name, 'client-feedback') &&
      (
        (github.event_name == 'issues' &&
          (github.event.action == 'opened' || github.event.label.name == 'client-feedback')) ||
        (github.event_name == 'issue_comment' &&
          github.event.action == 'created' &&
          contains(github.event.comment.body, '@claude'))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      ISSUE: ${{ github.event.issue.number }}
      DRY_RUN: ${{ vars.DRY_RUN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install deps (so in-Action build + Sharp work)
        run: npm ci

      - name: Run Claude on the feedback issue
        uses: anthropics/claude-code-action@v1
        with:
          # Owner's Claude MAX-plan OAuth token — NOT an API key.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Only the integer issue number is interpolated (injection-safe).
          # Claude fetches the client-controlled body/comments itself with gh,
          # rather than us inlining untrusted text into the prompt/YAML.
          prompt: |
            You are the Moulin à Rêves client-feedback agent for issue #${{ github.event.issue.number }}.
            Step 1: run `gh issue view ${{ github.event.issue.number }} --comments` to read the full thread (human summary, the fenced JSON locator, and any client clarification).
            Step 2: read .github/CLAUDE_FEEDBACK.md IN FULL and follow it exactly as your operating manual. It overrides the repo CLAUDE.md GSD section for this work.
            Step 3: make the smallest correct change on a `feedback/issue-${{ github.event.issue.number }}-<slug>` branch, open a PR that `Closes #${{ github.event.issue.number }}`, and apply labels per the autonomy gate (add `auto-approved` to the issue ONLY if every gate condition holds; otherwise `needs-review`, or `needs-client-reply` + one plain question).
            Step 4: post exactly one plain-language result comment on the issue (never include a bare @claude).
            Dry run mode is: ${{ vars.DRY_RUN == 'true' }} — if true, do everything except expect a merge; state in your comment what WOULD have happened.
          # show_full_output exposes Claude's tool calls in the Action log
          # (the SDK hides them by default for security). Worth it here because
          # the feedback flow is the only thing this workflow touches, and we
          # need visibility when an issue stalls.
          show_full_output: true
          claude_args: >-
            --max-turns 25
            --model claude-opus-4-7
            --append-system-prompt "Operating manual: you MUST read and obey .github/CLAUDE_FEEDBACK.md before acting. Never push to main or merge anything yourself; only label the issue per the autonomy gate. Keep all changes additive and never touch the editor flow."

      - name: Read issue labels after Claude
        id: labels
        run: |
          set -euo pipefail
          NAMES=$(gh issue view "$ISSUE" --json labels --jq '[.labels[].name] | join(",")')
          echo "names=$NAMES" >> "$GITHUB_OUTPUT"
          if echo ",$NAMES," | grep -q ',auto-approved,'; then
            echo "auto=true" >> "$GITHUB_OUTPUT"
          else
            echo "auto=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Squash-merge auto-approved PR
        id: merge
        if: steps.labels.outputs.auto == 'true' && env.DRY_RUN != 'true'
        run: |
          set -euo pipefail
          PR=$(gh pr list --state open --json number,headRefName \
                --jq "[.[] | select(.headRefName | startswith(\"feedback/issue-${ISSUE}-\")) | .number] | first")
          if [ -z "$PR" ] || [ "$PR" = "null" ]; then
            echo "No open feedback/issue-${ISSUE}-* PR found; nothing to merge."
            echo "merged=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Squash-merging PR #$PR"
          gh pr merge "$PR" --squash --delete-branch
          gh issue edit "$ISSUE" --add-label auto-merged --remove-label auto-approved
          echo "merged=true" >> "$GITHUB_OUTPUT"
          echo "pr=$PR" >> "$GITHUB_OUTPUT"

      - name: Always post a result comment
        if: always()
        run: |
          set -euo pipefail
          NAMES="${{ steps.labels.outputs.names }}"
          if [ "${{ steps.merge.outputs.merged }}" = "true" ]; then
            MSG="Done — this change was clear and low-risk, so it was applied automatically (PR #${{ steps.merge.outputs.pr }}) and the live site will update shortly."
          elif [ "${{ env.DRY_RUN }}" = "true" ] && [ "${{ steps.labels.outputs.auto }}" = "true" ]; then
            MSG="Dry run: this would have been auto-applied. A PR was opened for inspection; no merge was performed."
          elif echo ",$NAMES," | grep -q ',needs-client-reply,'; then
            MSG="Thanks! We need one quick clarification from you before we can make this change — please check the question above and reply from your feedback inbox."
          elif echo ",$NAMES," | grep -q ',needs-review,'; then
            MSG="Thanks! This one needs a person to look at it. A proposed change has been opened for review and will go live once approved."
          else
            MSG="This feedback was processed; see the activity above for details."
          fi
          gh issue comment "$ISSUE" --body "$MSG"
